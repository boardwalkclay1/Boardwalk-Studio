<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Boardwalk Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#f5d36b" />

    <link rel="stylesheet" href="./bw-studio.css" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script type="module" src="./components/CapabilitiesPanel.js"></script>
    <script type="module" src="./components/ProjectSwitcher.js"></script>
    <script type="module" src="./components/FileTree.js"></script>
    <script type="module" src="./components/Editor.js"></script>
    <script type="module" src="./components/RunDeployPanel.js"></script>
    <script type="module" src="./components/PreviewPanel.js"></script>
    <script type="module" src="./components/PluginSlots.js"></script>
    <script type="module" src="./components/CloudflarePanel.js"></script>

    <script type="module" src="./app.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </head>

  <body class="theme-gold">
    <div id="root"></div>
  </body>
</html>
